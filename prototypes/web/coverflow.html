<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◈ Spool — Cover Flow</title>
<style>
  :root {
    --bg: #0a0a14;
    --surface: #141428;
    --brass: #c4a35a;
    --green: #2dd4bf;
    --text: #e8dcc8;
    --text-dim: #8a7e6b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #0a0a14, #1a1a2e);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Header */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    background: linear-gradient(180deg, rgba(10,10,20,0.95), transparent);
  }
  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 2px;
  }
  .mode-badge {
    font-size: 10px;
    padding: 4px 10px;
    background: rgba(196,163,90,0.12);
    border: 1px solid rgba(196,163,90,0.25);
    border-radius: 12px;
    color: var(--brass);
    letter-spacing: 1px;
  }

  /* Glass backdrop */
  .glass-backdrop {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 320px;
    background: linear-gradient(to top, rgba(20,20,40,0.9), transparent);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
  }

  /* Cover Flow Container */
  .coverflow-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 400px;
    perspective: 1000px;
    perspective-origin: 50% 50%;
  }

  .carousel {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 200px;
    height: 200px;
    transform-style: preserve-3d;
    transform: translate(-50%, -50%) rotateY(var(--rotation, 0deg));
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .album {
    position: absolute;
    width: 200px;
    height: 200px;
    left: 50%;
    top: 50%;
    margin-left: -100px;
    margin-top: -100px;
    transform-style: preserve-3d;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .album-art {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #2a2a4a, #1a1a2a);
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 1px rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    transition: all 0.3s;
    overflow: hidden;
    position: relative;
  }

  .album-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Side albums tilt */
  .album[data-offset="-2"], .album[data-offset="2"] {
    opacity: 0.4;
  }
  .album[data-offset="-1"], .album[data-offset="1"] {
    opacity: 0.7;
  }
  .album[data-offset="0"] {
    opacity: 1;
  }
  .album[data-offset="0"] .album-art {
    transform: scale(1.15);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 40px rgba(45,212,191,0.1);
  }

  /* Reflection */
  .album-reflection {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    height: 100px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent 70%);
    transform: scaleY(-1);
    opacity: 0.3;
    pointer-events: none;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
  }

  /* Album info */
  .album-info {
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .album[data-offset="0"] .album-info {
    opacity: 1;
  }
  .album-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .album-artist {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Controls */
  .controls {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 100;
  }

  .nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(196,163,90,0.25);
    background: rgba(20,20,40,0.6);
    color: var(--brass);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .nav-btn:hover {
    border-color: var(--brass);
    box-shadow: 0 0 20px rgba(196,163,90,0.2);
  }
  .nav-btn:active {
    transform: scale(0.95);
  }

  .play-btn {
    width: 56px;
    height: 56px;
    background: rgba(45,212,191,0.15);
    border-color: rgba(45,212,191,0.3);
    color: var(--green);
    font-size: 22px;
  }
  .play-btn:hover {
    border-color: var(--green);
    box-shadow: 0 0 30px rgba(45,212,191,0.3);
  }

  /* Empty state */
  .empty-state {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 50;
  }
  .empty-icon { font-size: 72px; margin-bottom: 20px; opacity: 0.5; }
  .empty-text { font-size: 16px; color: var(--text-dim); }
  .empty-sub { font-size: 12px; color: var(--text-dim); margin-top: 8px; opacity: 0.6; }

  /* Dots indicator */
  .dots {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 100;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .dot.active {
    background: var(--green);
    box-shadow: 0 0 8px rgba(45,212,191,0.5);
  }

  /* Spring physics indicator */
  .spring-indicator {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .spring-indicator.visible {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">◈ SPOOL</div>
  <div class="mode-badge">COVER FLOW</div>
</div>

<div class="glass-backdrop"></div>

<div class="spring-indicator" id="spring-indicator">Momentum: 0.00</div>

<div class="coverflow-container">
  <div class="carousel" id="carousel"></div>
</div>

<div class="dots" id="dots"></div>

<div class="controls" id="controls" style="display:none">
  <button class="nav-btn" onclick="prev()" title="Previous">◀</button>
  <button class="nav-btn play-btn" id="play-btn" onclick="playSelected()" title="Play">▶</button>
  <button class="nav-btn" onclick="next()" title="Next">▶</button>
  <button class="nav-btn" onclick="openFolder()" title="Open Folder">📂</button>
</div>

<div class="empty-state" id="empty-state">
  <div class="empty-icon">💿</div>
  <div class="empty-text">Drop music in your Spool folder</div>
  <div class="empty-sub">Or click 📂 to pick a folder</div>
</div>

<script>
  let albums = [];
  let currentIndex = 0;
  let isPlaying = false;
  let velocity = 0;
  let animating = false;
  const audio = new Audio();

  const carousel = document.getElementById('carousel');
  const dots = document.getElementById('dots');
  const controls = document.getElementById('controls');
  const emptyState = document.getElementById('empty-state');
  const springIndicator = document.getElementById('spring-indicator');

  // === File Handling ===
  const SPOOL_DIR_ID = 'spool-music-dir';
  let dirHandle = null;

  async function pickFolder() {
    if (!('showDirectoryPicker' in window)) {
      alert('Your browser doesn\'t support folder access.\n\nDrag and drop files onto this window instead.');
      return false;
    }
    try {
      dirHandle = await window.showDirectoryPicker({
        mode: 'readwrite',
        startIn: 'desktop',
        id: SPOOL_DIR_ID,
      });
      await scanFolder();
      return true;
    } catch (e) {
      return false;
    }
  }

  async function scanFolder() {
    if (!dirHandle) return;
    albums = [];
    const audioExts = ['.mp3', '.wav', '.flac', '.ogg', '.m4a', '.aac', '.wma', '.opus'];

    for await (const entry of dirHandle.values()) {
      if (entry.kind === 'file') {
        const ext = '.' + entry.name.split('.').pop().toLowerCase();
        if (audioExts.includes(ext)) {
          const file = await entry.getFile();
          albums.push({
            name: entry.name.replace(/\.[^.]+$/, ''),
            file: file,
            url: URL.createObjectURL(file),
          });
        }
      }
    }
    albums.sort((a, b) => a.name.localeCompare(b.name));
    render();
  }

  // === Drag & Drop ===
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', async e => {
    e.preventDefault();
    for (const item of e.dataTransfer.items) {
      if (item.kind === 'file') {
        const file = item.getAsFile();
        if (file.type.startsWith('audio/') || file.name.match(/\.(mp3|wav|flac|ogg|m4a|aac|wma|opus)$/i)) {
          albums.push({
            name: file.name.replace(/\.[^.]+$/, ''),
            file: file,
            url: URL.createObjectURL(file),
          });
        }
      }
    }
    albums.sort((a, b) => a.name.localeCompare(b.name));
    render();
  });

  // === Render ===
  function render() {
    if (albums.length === 0) {
      emptyState.style.display = 'block';
      controls.style.display = 'none';
      return;
    }
    emptyState.style.display = 'none';
    controls.style.display = 'flex';
    renderCarousel();
    renderDots();
  }

  function renderCarousel() {
    carousel.innerHTML = '';
    const displayCount = Math.min(albums.length, 5);
    const angleStep = 45; // degrees between albums
    const zOffset = 150;

    for (let i = 0; i < albums.length; i++) {
      const offset = i - currentIndex;
      const album = albums[i];

      const div = document.createElement('div');
      div.className = 'album';
      div.dataset.index = i;
      div.dataset.offset = Math.max(-2, Math.min(2, offset));

      const rotateY = offset * angleStep;
      const translateZ = -Math.abs(offset) * zOffset;
      const translateX = offset * 100;

      div.style.transform = `translateX(${translateX}px) rotateY(${rotateY}deg) translateZ(${translateZ}px)`;

      const art = document.createElement('div');
      art.className = 'album-art';
      art.innerHTML = getAlbumArt(album.name);

      const reflection = document.createElement('div');
      reflection.className = 'album-reflection';
      reflection.innerHTML = getAlbumArt(album.name);

      const info = document.createElement('div');
      info.className = 'album-info';
      info.innerHTML = `
        <div class="album-title">${album.name}</div>
        <div class="album-artist">Spool Library</div>
      `;

      div.appendChild(art);
      div.appendChild(reflection);
      div.appendChild(info);

      div.addEventListener('click', () => {
        if (offset === 0) playSelected();
        else goToIndex(i);
      });

      carousel.appendChild(div);
    }
  }

  function getAlbumArt(name) {
    // Generate consistent "album art" based on name hash
    const colors = [
      ['#e04343', '#ff6b6b'], // red
      ['#2dd4bf', '#4ade80'], // green
      ['#c4a35a', '#f59e0b'], // gold
      ['#8b5cf6', '#a78bfa'], // purple
      ['#3b82f6', '#60a5fa'], // blue
      ['#ec4899', '#f472b6'], // pink
    ];
    const hash = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const [c1, c2] = colors[hash % colors.length];
    return `<div style="width:100%;height:100%;background:linear-gradient(135deg,${c1},${c2});display:flex;align-items:center;justify-content:center;font-size:48px;">${name.charAt(0).toUpperCase()}</div>`;
  }

  function renderDots() {
    dots.innerHTML = albums.map((_, i) =>
      `<div class="dot ${i === currentIndex ? 'active' : ''}" onclick="goToIndex(${i})"></div>`
    ).join('');
  }

  // === Navigation ===
  function goToIndex(i) {
    if (i < 0 || i >= albums.length) return;
    currentIndex = i;
    renderCarousel();
    renderDots();
  }

  function next() {
    if (albums.length === 0) return;
    currentIndex = (currentIndex + 1) % albums.length;
    renderCarousel();
    renderDots();
  }

  function prev() {
    if (albums.length === 0) return;
    currentIndex = (currentIndex - 1 + albums.length) % albums.length;
    renderCarousel();
    renderDots();
  }

  // === Spring Physics (momentum-based scrolling) ===
  let startX = 0;
  let dragging = false;

  document.addEventListener('mousedown', e => {
    if (albums.length === 0) return;
    dragging = true;
    startX = e.clientX;
    velocity = 0;
    animating = false;
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    velocity = e.clientX - startX;
    startX = e.clientX;
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    if (Math.abs(velocity) > 20) {
      springIndicator.classList.add('visible');
      animateSpring(velocity);
    }
  });

  function animateSpring(v) {
    if (animating) return;
    animating = true;
    let momentum = v;
    const decay = 0.92;
    const threshold = 30;

    function tick() {
      momentum *= decay;
      springIndicator.textContent = `Momentum: ${Math.abs(momentum).toFixed(2)}`;

      if (Math.abs(momentum) > threshold) {
        currentIndex = momentum > 0 ? prevIndex() : nextIndex();
        renderCarousel();
        renderDots();
      }

      if (Math.abs(momentum) > 1) {
        requestAnimationFrame(tick);
      } else {
        animating = false;
        springIndicator.classList.remove('visible');
        momentum = 0;
      }
    }
    requestAnimationFrame(tick);
  }

  function prevIndex() { return (currentIndex - 1 + albums.length) % albums.length; }
  function nextIndex() { return (currentIndex + 1) % albums.length; }

  // === Playback ===
  function playSelected() {
    if (albums.length === 0 || currentIndex < 0) return;
    const album = albums[currentIndex];
    audio.src = album.url;
    audio.play().catch(e => console.error('Playback error:', e));
    isPlaying = true;
    document.getElementById('play-btn').innerHTML = '⏸';
  }

  audio.addEventListener('ended', () => {
    next();
    if (isPlaying) playSelected();
  });

  // === Keyboard ===
  document.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft') prev();
    else if (e.code === 'ArrowRight') next();
    else if (e.code === 'Space') { e.preventDefault(); playSelected(); }
  });

  // === Init ===
  render();

  // Try auto-reconnect
  (async () => {
    if ('showDirectoryPicker' in window) {
      try {
        dirHandle = await window.showDirectoryPicker({
          mode: 'readwrite',
          startIn: 'desktop',
          id: SPOOL_DIR_ID,
        });
        await scanFolder();
      } catch (e) { /* ignore */ }
    }
  })();

  function openFolder() { pickFolder(); }
</script>
</body>
</html>
